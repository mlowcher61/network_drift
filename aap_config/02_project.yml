---
- name: Create AAP project
  hosts: localhost
  gather_facts: false
  module_defaults:
    group/ansible.platform.controller:
      controller_host: "{{ aap_hostname }}"
      controller_username: "{{ aap_username }}"
      controller_password: "{{ aap_password }}"
      validate_certs: "{{ aap_validate_certs | default(false) }}"
  tasks:
    - name: network_drift project (SCM)
      ansible.platform.project:
        name: network_drift
        description: Network configuration drift detection and remediation
        organization: "{{ aap_organization | default('Default') }}"
        scm_type: git
        scm_url: "{{ project_scm_url | default('https://github.com/mlowcher61/network_drift.git') }}"
        scm_branch: main
        scm_update_on_launch: true
        scm_clean: true
