---
# Credential SHELL only — the admin enters real values via the AAP UI after
# deploy. Per standards, no secrets ever live in this repo.
- name: Create credential shells
  hosts: localhost
  gather_facts: false
  
  tasks:
    - name: cred_servicenow
      ansible.controller.credential:
        name: cred_servicenow
        credential_type: servicenow
        organization: "{{ aap_organization | default('Default') }}"
        inputs:
          SN_HOST: PLACEHOLDER
          SN_USERNAME: PLACEHOLDER
          SN_PASSWORD: PLACEHOLDER

    - name: cred_github
      ansible.controller.credential:
        name: cred_github
        credential_type: github_scm_write
        organization: "{{ aap_organization | default('Default') }}"
        inputs:
          GITHUB_TOKEN: PLACEHOLDER
          GIT_AUTHOR_NAME: PLACEHOLDER
          GIT_AUTHOR_EMAIL: PLACEHOLDER
