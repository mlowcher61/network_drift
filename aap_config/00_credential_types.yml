---
# Custom credential types. Per standards, all sensitive values live in AAP —
# never in vaulted git files. ServiceNow values are injected as environment
# variables so the servicenow.itsm collection picks them up automatically.
- name: Create custom credential types
  hosts: localhost
  gather_facts: false
  
  tasks:
    - name: servicenow credential type
      ansible.controller.credential_type:
        name: servicenow
        description: ServiceNow instance credentials for ITSM integration
        kind: cloud
        inputs:
          fields:
            - id: SN_HOST
              type: string
              label: ServiceNow Instance URL
            - id: SN_USERNAME
              type: string
              label: Username
            - id: SN_PASSWORD
              type: string
              label: Password
              secret: true
          required: [SN_HOST, SN_USERNAME, SN_PASSWORD]
        injectors:
          env:
            SN_HOST: "{% raw %}{{ SN_HOST }}{% endraw %}"
            SN_USERNAME: "{% raw %}{{ SN_USERNAME }}{% endraw %}"
            SN_PASSWORD: "{% raw %}{{ SN_PASSWORD }}{% endraw %}"

    # Used by gather_state_to_git.yml to push the backups/ snapshot back to
    # GitHub. The token is injected as GITHUB_TOKEN; the git author/committer
    # identity is injected via git's native env vars so commits are attributed
    # correctly without writing any git config.
    - name: github scm write credential type
      ansible.controller.credential_type:
        name: github_scm_write
        description: GitHub token + identity for pushing gathered state to git
        kind: cloud
        inputs:
          fields:
            - id: GITHUB_TOKEN
              type: string
              label: GitHub Personal Access Token (repo scope)
              secret: true
            - id: GIT_AUTHOR_NAME
              type: string
              label: Commit Author Name
            - id: GIT_AUTHOR_EMAIL
              type: string
              label: Commit Author Email
          required: [GITHUB_TOKEN, GIT_AUTHOR_NAME, GIT_AUTHOR_EMAIL]
        injectors:
          env:
            GITHUB_TOKEN: "{% raw %}{{ GITHUB_TOKEN }}{% endraw %}"
            GIT_AUTHOR_NAME: "{% raw %}{{ GIT_AUTHOR_NAME }}{% endraw %}"
            GIT_AUTHOR_EMAIL: "{% raw %}{{ GIT_AUTHOR_EMAIL }}{% endraw %}"
            GIT_COMMITTER_NAME: "{% raw %}{{ GIT_AUTHOR_NAME }}{% endraw %}"
            GIT_COMMITTER_EMAIL: "{% raw %}{{ GIT_AUTHOR_EMAIL }}{% endraw %}"
