---
# Custom credential types. Per standards, all sensitive values live in AAP —
# never in vaulted git files. ServiceNow values are injected as environment
# variables so the servicenow.itsm collection picks them up automatically.
- name: Create custom credential types
  hosts: localhost
  gather_facts: false
  module_defaults:
    group/ansible.platform.controller:
      controller_host: "{{ aap_hostname }}"
      controller_username: "{{ aap_username }}"
      controller_password: "{{ aap_password }}"
      validate_certs: "{{ aap_validate_certs | default(false) }}"
  tasks:
    - name: servicenow credential type
      ansible.platform.credential_type:
        name: servicenow
        description: ServiceNow instance credentials for ITSM integration
        kind: cloud
        inputs:
          fields:
            - id: SN_HOST
              type: string
              label: ServiceNow Instance URL
            - id: SN_USERNAME
              type: string
              label: Username
            - id: SN_PASSWORD
              type: string
              label: Password
              secret: true
          required: [SN_HOST, SN_USERNAME, SN_PASSWORD]
        injectors:
          env:
            SN_HOST: "{% raw %}{{ SN_HOST }}{% endraw %}"
            SN_USERNAME: "{% raw %}{{ SN_USERNAME }}{% endraw %}"
            SN_PASSWORD: "{% raw %}{{ SN_PASSWORD }}{% endraw %}"
