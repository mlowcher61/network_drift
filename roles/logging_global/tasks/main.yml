---
- name: Check logging_global configuration
  ansible.netcommon.network_resource:
    config: "{{ hostvars[inventory_hostname]['logging_global'] }}"   
    os_name: "{{ hostvars[inventory_hostname]['ansible_network_os'] }}"
    name: logging_global
    state: "{{ state }}"
  register: logging_global_diff
  check_mode: "{{ check_mode }}"

# - name: Display Drift Results
#   ansible.builtin.debug:
#     var: logging_global_diff  # logging_global_diff.results

- ansible.utils.fact_diff:
    before: "{{ logging_global_diff.before }}"
    after: "{{ hostvars[inventory_hostname]['logging_global'] }}"
  diff: "{{ diffs }}"
  delegate_to: localhost
  when: diffs == true

- name: if logging_global drift found, open a servicenow ticket
  ansible.builtin.debug:
    msg: "logging_global Global configuration drift detected on {{ inventory_hostname }}. Please investigate. Servicenow incident ticket has been created AND there will be hell to pay! The AAP job is is {{ tower_job_id }}"
  when: logging_global_diff.changed
  tags:
    - drift_alert
    - update_incident

- name: create servicenow ticket for logging_global drift
  register: logging_global_incident 
  servicenow.itsm.incident:
    caller: "service.ansible"
    state: new
    short_description: "logging_global Global configuration drift detected on {{ inventory_hostname }}"
    description: "The logging_global Global configuration on device {{ inventory_hostname }} has drifted from the desired state. Please investigate and remediate as necessary. The AAP job is is {{ tower_job_id }}" 
    urgency: medium
    impact: medium
    other:
      assignment_group: "Ansible West Tigers"
  when: logging_global_diff.changed
  tags:
    - drift_alert
    - update_incident
  delegate_to: localhost

# - name: Print logging_global incident results
#   ansible.builtin.debug:
#     var: logging_global_incident
#   when: logging_global_diff.changed
#   tags:
#     - drift_alert

- name: Print created logging_global incident ticket number
  ansible.builtin.debug:
    msg: "The incident ticket number is {{ logging_global_incident.record.number }}"
  when: logging_global_diff.changed
  tags:
    - drift_alert
    - update_incident

- name: Set logging_global incident ticket number stat and sys_id
  register: logging_global_incident_stats
  ansible.builtin.set_stats:
    data:
      logging_global_incident_ticket_number: "{{ logging_global_incident.record.number }}"
      logging_global_incident_sys_id: "{{ logging_global_incident.record.sys_id }}"
      per_host: false   # optional: make it a single stat for the whole play
  when: logging_global_diff.changed
  tags:
    - drift_alert
    - update_incident

- name: Print logging_global incident stats!!!!!!!!!!!!!!!!!!
  ansible.builtin.debug:
    msg: "The sys_id is {{ logging_global_incident_stats.ansible_stats.data.logging_global_incident_sys_id }}"
  when: logging_global_diff.changed
  tags:
    - drift_alert
    - update_incident

- name: Runs when updating an incident
  tags:
    - always
  block:

    # - name: Retrieve requested item incident sysid for each ticket
    #   when: logging_global_diff.changed
    #   register: result
    #   servicenow.itsm.api_info:
    #     resource: incident
    #     sysparm_query: "numberSTARTSWITH{{ logging_global_incident_ticket_number }}"

    # - name: Print the result
    #   when: logging_global_diff.changed
    #   ansible.builtin.debug:
    #     var: result

    - name: Update the incident item work notes and state in ServiceNow
      when: logging_global_diff.changed
      tags:
        - patch 
        - update_incident
      servicenow.itsm.api:
        action: patch
        resource: incident
        sys_id:  "{{ logging_global_incident_sys_id }}" #"{{ result.record[0].sys_id }}"
        data:
          close_code: "{{ update_incident_close_code | default(omit) }}"
          close_notes: "{{ update_incident_close_notes | default(omit) }}"
          incident_state: "{{ update_incident_incident_state | default(omit) }}"