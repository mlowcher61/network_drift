---
- name: Check SNMPv3 configuration
  ansible.netcommon.network_resource:
    config: "{{ hostvars[inventory_hostname]['snmp_server'] }}"   
    os_name: "{{ hostvars[inventory_hostname]['ansible_network_os'] }}"
    name: snmp_server
    state: "{{ state }}"
  register: snmp_diff
  check_mode: "{{ check_mode }}"

# - name: Display Drift Results
#   ansible.builtin.debug:
# snmp_diff.results

- ansible.utils.fact_diff:
    before: "{{ snmp_diff.before }}"
    after: "{{ hostvars[inventory_hostname]['snmp_server'] }}"
  diff: "{{ diffs }}"
  delegate_to: localhost
  when: diffs == true

- name: if snmp_diff drift found, open a servicenow ticket
  ansible.builtin.debug:
    msg: "SNMP server configuration drift detected on {{ inventory_hostname }}. Please investigate. Servicenow incident ticket has been created remediation is waiting approval! The AAP job is is {{ tower_job_id }}"
  when: snmp_diff.changed
  tags:
    - drift_alert

- name: create servicenow ticket for snmp-server drift
  register: snmp_incident 
  servicenow.itsm.incident:
    caller: "service.ansible"
    state: new
    short_description: "SNMP server configuration drift detected on {{ inventory_hostname }}"
    description: "The SNMP server configuration on device {{ inventory_hostname }} has drifted from the desired state. Please investigate and remediate as necessary. The AAP job is is {{ tower_job_id }}" 
    urgency: medium
    impact: medium
    other:
      assignment_group: "Ansible West Tigers"
  when: snmp_diff.changed
  tags:
    - drift_alert
  delegate_to: localhost

# - name: Print snmp incident results
#   ansible.builtin.debug:
#     var: snmp_incident
#   when: snmp_diff.changed
#   tags:
#     - drift_alert

- name: Print created snmp incident ticket number
  ansible.builtin.debug:
    msg: "The incident ticket number is {{ snmp_incident.record.number }}"
  when: snmp_diff.changed
  tags:
    - drift_alert

- name: Set snmp incident ticket number stat
  register: snmp_incident_stats
  ansible.builtin.set_stats:
    data:
      snmp_incident_ticket_number: "{{ snmp_incident.record.number }}"
      snmp_incident_sys_id: "{{ snmp_incident.record.sys_id }}"
      per_host: false   # optional: make it a single stat for the whole play
  when: snmp_diff.changed
  tags:
    - drift_alert

- name: Print SNMP incident stats
  ansible.builtin.debug:
    var: snmp_incident_stats
  when: snmp_diff.changed
  tags:
    - drift_alert

- name: Runs when updating an incident
  tags:
    - always
  block:

    - name: Retrieve requested item incident sysid for each ticket
      when: snmp_diff.changed
      register: result
      servicenow.itsm.api_info:
        resource: incident
        sysparm_query: "numberSTARTSWITH{{ snmp_incident_ticket_number }}"

    - name: Print the result
      when: snmp_diff.changed
      ansible.builtin.debug:
        var: result

    - name: Update the incident item work notes and state in ServiceNow
      when: snmp_diff.changed
      servicenow.itsm.api:
        action: patch
        resource: incident
        sys_id: "{{ result.record[0].sys_id }}"
        data:
          close_code: "{{ update_incident_close_code | default(omit) }}"
          close_notes: "{{ update_incident_close_notes | default(omit) }}"
          incident_state: "{{ update_incident_incident_state | default(omit) }}"